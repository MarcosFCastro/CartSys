; ============================================================================
; CartSys - ERP Vendas - configuracao da aplicacao
; Copie para a pasta do executavel e ajuste os valores conforme seu ambiente.
; ============================================================================

[Database]
Server=localhost
Port=3050
Path=C:\CartSys\DB\ERP_VENDAS.FDB
User=SYSDBA
Password=masterkey

[ApiFinanceiro]
; URL base do ERP Financeiro (C#) que recebe os titulos
Url=http://localhost:5001
ApiKey=cartsys-dev-key
TimeoutSeg=30

[ApiVendas]
; Porta em que o servidor REST embarcado escuta callbacks
Port=5002

[SMTP]
Host=smtp.gmail.com
Port=587
User=seu-email@gmail.com
Password=sua-senha-de-app
From=seu-email@gmail.com
UseSSL=True

[Log]
; Pasta onde sao escritos os logs diarios. Sera criada se nao existir.
Path=C:\CartSys\Logs\Vendas
